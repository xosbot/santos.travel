# ============================================================================
# IVA Cortex — Production Docker Compose
# ============================================================================
# Usage:
#   docker compose up -d
#   docker compose exec db psql -U santos -d santos_travel < db/schema.sql
#   docker compose exec db psql -U santos -d santos_travel < db/seed.sql
# ============================================================================

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=santos_travel
      - DB_USER=santos
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - API_KEYS=${API_KEYS:-}
    volumes:
      - pdf_output:/app/pdf_output
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=santos_travel
      - POSTGRES_USER=santos
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santos -d santos_travel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  pdf_output:
